{% extends "admin/login.html" %}

{% load static %}
{% block content %}
<div style="max-width: 400px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); padding: 32px;">
    <div style="text-align:center; margin-bottom: 24px; align-items: center; display: flex; flex-direction: column;">
        <h2 style="margin: 0 0 8px 0; font-weight: 600; color: #9333ea; font-size: 20px">Reset Password</h2>
        <p style="color: #555;">Enter your email to receive the password reset link.</p>
    </div>
    <form method="post" style="display: flex; flex-direction: column; gap: 16px;">
        {% csrf_token %}
        <div>
            <span style="color: #111827; font-weight: bold; font-family: 'Segoe UI', 'Arial', sans-serif;">
                {{ form.email.label_tag }}
            </span>
              <style>
                input[type="email"] {
                    margin-top: 10px;
                    border: 1px solid #ccc;
                    border-radius: 6px;
                    width: 100%;
                    box-sizing: border-box;
                    padding: 8px 12px;
                }
            </style>
            {{ form.email }}
            {% if form.email.errors %}
                <div style="color: #c00; font-size: 13px;">{{ form.email.errors }}</div>
            {% endif %}
        </div>
        <button type="submit" class="button" style="background: #9333ea; color: #fff; border: none; border-radius: 4px; padding: 10px 0; font-weight: 600; cursor: pointer;">
            Send reset link
        </button>
    </form>
    <div style="text-align:center; margin-top: 20px;">
        <a href="{% url 'admin:login' %}" style="color: #9333ea; text-decoration: underline;">Back to login</a>
    </div>
</div>
{% endblock %}
