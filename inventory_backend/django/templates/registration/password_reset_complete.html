{% extends "admin/login.html" %}
{% load static %}
{% block content %}
<div style="max-width: 400px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); padding: 32px;">
    <div style="text-align:center; margin-bottom: 24px; display: flex; flex-direction: column; align-items: center;">
        <h2 style="margin: 0 0 8px 0; font-weight: 600; color: #9333ea; font-size: 20px">Password Reset Complete</h2>
        <p style="color: #555;">Your password has been set. You may now log in.</p>
    </div>
    <div style="text-align:center; margin-top: 20px;">
        <a href="{% url 'admin:login' %}" style="color: #9333ea; text-decoration: underline;">Go to login</a>
    </div>
</div>
{% endblock %}
